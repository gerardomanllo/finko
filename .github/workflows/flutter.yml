# Matches `.cursor/rules/finko-ci-github.mdc`
name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - run: flutter analyze

      - run: flutter test
